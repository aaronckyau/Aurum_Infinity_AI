<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin 登入 | Aurum Intelligence</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            background: #f5f4f0;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            width: 100%;
            max-width: 400px;
            padding: 24px;
        }
        .logo {
            text-align: center;
            margin-bottom: 40px;
        }
        .logo h1 {
            font-size: 22px;
            color: #b18e4d;
            letter-spacing: 0.3em;
            text-transform: uppercase;
        }
        .logo p {
            font-size: 11px;
            color: #999;
            letter-spacing: 0.2em;
            margin-top: 6px;
        }
        .card {
            background: #fff;
            border: 1px solid #e5e5e5;
            border-top: 3px solid #b18e4d;
            padding: 32px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            font-size: 10px;
            color: #999;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        input[type="password"] {
            width: 100%;
            background: #fafafa;
            border: 1px solid #e5e5e5;
            color: #1a1a1a;
            padding: 12px 16px;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="password"]:focus { border-color: #b18e4d; }
        .btn-login {
            width: 100%;
            background: #b18e4d;
            color: #fff;
            border: none;
            padding: 14px;
            font-family: inherit;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-login:hover { background: #9a7a3e; }
        .error {
            background: #fff5f5;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 10px 14px;
            font-size: 12px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">
            <h1>⬡ Aurum</h1>
            <p>// Admin 管理後台</p>
        </div>
        <div class="card">
            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}
            <form method="POST" action="/admin/login">
                <div class="form-group">
                    <label>管理員密碼</label>
                    <input type="password" name="password" autofocus placeholder="輸入密碼...">
                </div>
                <button type="submit" class="btn-login">登入</button>
            </form>
        </div>
    </div>
</body>
</html>
