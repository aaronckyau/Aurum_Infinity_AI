sections:
  biz:
    name: 商業模式分析
    prompt: "資料來源指引：{data_source}\n目前實際時間為: {today}\n\n⚠️【第零步強制執行：架構確認】\n在撰寫任何業務拆解或分部數據前，必須先執行以下步驟：\n\
      \n步驟 A — 搜尋最新業績公告標題，確認以下三項：\n  (i)   最新已發布報告期（如「FY2025 全年業績」）及發布日期\n  (ii) \
      \ 當前有效的業務分部名稱（公司可能已重組）\n  (iii) 分部數量是否與過往不同\n\n\n【數據時效確認規則】\n在填寫任何財務數據前，必須先搜尋確認：\n\
      (i)  該公司最新已公布的完整財務報告期（年報/中期報告）及發布日期\n(ii) 若全年業績尚未公布，所有業務佔比數據必須標注\n     「⚠️ 基於\
      \ [具體報告期] 數據，全年業績待公布」\n(iii) 嚴格區分以下三種口徑，不得混用：\n     ● 營業收入（Revenue）\n     ●\
      \ 新簽合同額（New Contract Value）\n     ● 在手合同額（Backlog）\n\n【業務佔比計算規則】\n所有業務分部的「營收佔比」必須由官方業績公告的分部收入數字\n\
      \n步驟 B — 若搜尋結果顯示業務分部名稱與分析模板不符，\n  必須以最新公告的分部名稱覆蓋模板，不得沿用舊框架填寫新數字。\n\n步驟 C — 在報告頂部標注：\n\
      \  「業務架構依據：[文件名稱] [發布日期] [有效起始日期]」\n\n## 分析標的：{stock_name}（{ticker}，{exchange}）\n\
      請在網上查看最新資料，包括公司官網、財報、新聞報導、分析師報告等，全面了解該公司的商業模式與市場定位。\n請依照以下框架逐項分析：\n\n### 一、價值主張（Value\
      \ Proposition）\n用一段簡潔的白話文（3-5句）說明這家公司為客戶解決了什麼問題、創造了什麼價值。\n避免使用公司官方行銷用語，用你自己的理解重新詮釋。\n\
      \n### 二、核心業務拆解\n- 具體說明公司的主要業務線（Business Segments），每條業務線簡述其運作模式。\n- 各業務線的營收佔比與近年趨勢，請以\
      \ Markdown 表格呈現：\n\n| 業務線 | 營收佔比(%) | 近年趨勢 | 備註 |\n|--------|------------|----------|------|\n\
      \n### 三、市場焦點與情緒\n- 目前市場（分析師、投資人）最關注該公司的哪項業務或議題？\n- 市場情緒偏正面還是負面？請說明具體原因。\n- 近期是否有重大催化劑（Catalyst）或風險事件？\n\
      \n### 四、客戶結構與營收集中度\n以 Markdown 表格展示主要客戶類型及其約略營收貢獻比例：\n\n| 客戶/客戶類型 | 約略營收佔比(%)\
      \ | 關係穩定性 |\n|--------------|----------------|-----------|\n\n是否存在客戶集中度風險（單一客戶佔比超過\
      \ 10%）？\n\n### 五、產業鏈定位（上下游分析）\n- **上游（供應商）**：關鍵供應商有哪些？是否存在供應鏈集中風險或議價劣勢？\n- **下游（通路/終端客戶）**：產品如何到達終端用戶？是否受制於特定通路？\n\
      - **整體評估**：該公司在產業鏈中的議價能力如何？\n\n### 六、競爭格局與差異化\n- 主要競爭對手有哪些？（列出 3-5 家，標註其上市地點）\n\
      - 與競爭對手的關鍵差異是什麼？有何創新或獨特之處？\n- **優勢（Strengths）**：列出 2-3 項核心優勢。\n- **劣勢（Weaknesses）**：列出\
      \ 2-3 項主要劣勢或隱憂。\n\n### 七、法律與合規風險\n- 目前是否有重大訴訟或監管調查？\n- 其商業模式是否存在潛在的法律或合規風險？\n\
      - 根據 {exchange} 市場，請特別關注：{legal_focus}\n\n### 八、護城河評估（Moat Rating）\n請從以下五個維度分別評分（每項\
      \ 1-10 分），並給出綜合評分：\n\n| 護城河維度 | 評分(1-10) | 簡要說明 |\n|-----------|-----------|---------|\n\
      | 品牌效應 | | |\n| 轉換成本 | | |\n| 網絡效應 | | |\n| 成本優勢 | | |\n| 規模/專利壁壘 | | |\n| **綜合評分**\
      \ | | |\n\n最後用 2-3 句話總結該公司護城河的強弱與可持續性。"
  finance:
    name: 財務分析
    prompt: "資料來源指引：{data_source}\n目前實際時間為: {today}\n\n**強制執行規則**：\n- ✅ 如無法找到準確數據，必須明確寫「數據未能確認」，不可猜測\n\
      - ✅ 所有百分比變化必須顯示計算公式\n- ✅ 發現數據源之間差異 >3% 時，必須列出所有版本並說明\n- ❌ 絕對不可使用「大約」「估計」等模糊詞彙描述財務數字\n\
      - ❌ 不可憑記憶或訓練數據提供具體數字\n\n## 分析標的：{stock_name}（{ticker}，{exchange}）\n請在網上查看最新資料，US\
      \ stock 所有數據均以 yahoo Finance 為主, please cross check with google fin\n港股、A/H股\
      \ 股請優先透過 香港交易所「披露易」(hkexnews.hk) and 東方財富網巨潮資訊網\n1. **最新季度財務概述** \n\n  簡單總結最新季度（請明確寫出係邊個季度，例如「x財年Qx」）嘅主要財務表現：收入、毛利、營業利潤、淨利潤、每股盈利（EPS）、現金流情況。\
      \ \n  必須同時列出：\n  - GAAP（報告）數字\n  - 公司提供嘅非GAAP（adjusted）數字（如有）\n  用表格或清晰數字呈現，並與前一季度及去年同期比較主要變化百分比。\n\
      \n2. **關鍵財務比率分析與比較** \n  計算並比較核心比率（毛利率、營業利利率、淨利率、ROA、ROE、負債權益比率、流動比率等）。 \n \
      \ 請分別用GAAP同非GAAP數字計算（如公司有提供非GAAP），並指出差異背後嘅主要驅動因素。\n\n3. **非經常性項目（One-time Items）深度分析**\
      \ \n  這係重點部分，請主動識別並量化所有重大非經常性收入與費用項目，包括但不限於：\n  - 重組費用（restructuring charges）\n\
      \  - 資產減值（impairment charges）\n  - 訴訟和解或罰款（litigation settlements）\n  - 資產出售收益/損失（gains/losses\
      \ on asset sales）\n  - 併購相關費用（acquisition-related costs）\n  - 稅項一次性調整\n  - 其他管理層標註為「non-recurring」或「special」嘅項目\n\
      (有效稅率必須從 Income Statement（所得稅費用÷稅前利潤）倒推計算，不得使用估算值)\n\n  - 列出每個項目嘅金額、性質同所在報表位置\n\
      \  - 計算該等項目對淨利潤同EPS嘅總影響（稅後）\n    計算該等項目對淨利潤同PE ratio嘅總影響（稅後） \n  - 計算「調整後」（excluding\
      \ one-time items）嘅淨利潤同EPS，並與公司報告數字比較\n  - 檢查過往幾個季度是否有類似項目重複出現（是否真正「one-time」）\n\
      \  - 評估公司非GAAP調整嘅合理性（如有不合理排除項目，請標註）\n\n4. **異常項目偵測（Red Flags）** \n  除咗一般紅旗外，特別關注：\n\
      \  - 非經常性項目是否過多或金額異常大\n  - 是否用one-time charges來「大洗澡」（big bath）或平滑盈利\n  - 現金流與調整後盈利背離\n\
      \  - 管理層對非經常性項目嘅解釋是否模糊\n\n5. **隱藏風險與管理層信號** \n  綜合評估一次性項目是否掩蓋核心業務疲弱、是否有盈利管理跡象。\n\
      \n- 表格必須使用 Markdown 格式\n- 第一行是表頭：| 維度名稱 | 評分(1-10) | 簡要說明 |\n- 最後一行是綜合評分，使用粗體\
      \ **綜合評分**\n- 評分範圍 1-10 分（10分最高）\n- 簡要說明要簡潔、有理有據\n\n表格結構如下：\n\n| 維度名稱      \
      \    | 評分(1-10) | 簡要說明 |\n|-------------------|-----------|---------|\n| 維度1\
      \             |           |         |\n| 維度2             |           |     \
      \    |\n| 維度3             |           |         |\n| 維度4             |     \
      \      |         |\n| 維度5             |           |         |\n| **綜合評分**  \
      \    |           |         |\n\n現在請根據年度業績預告（扭虧為盈但扣非仍虧損、非經常性收益主導、歷史合規問題等），對以下五個維度進行評分：\n\
      \n1. 盈利質量與可持續性\n2. 現金流健康度\n3. 資產負債結構\n4. 治理與透明度\n5. 整體風險水平\n\n最後用 2-3 句話總結該公司財務分析的強弱與可持續性。\n\
      \n## ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n## 模型行為指引（針對 Gemini Flash 速度優先模型）\n\
      ## ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n1. 不得使用模型訓練記憶中的財務數字\n   → 所有數字必須來自本次\
      \ session 的實際搜尋或文件結果\n\n2. 每個數字列出前，先顯示心算驗證步驟\n   → 例如：OCF/淨利率 = $53,925M / $42,097M\
      \ = 1.281，取 1.28\n\n3. YoY 對比必須同源，使用相同口徑的同期官方財報\n   → 不可混用 Yahoo Finance 與 SEC\
      \ 數字而不說明\n\n\n5. 發現矛盾時：停止→列出矛盾→說明採用哪個及原因\n   → 例如：「Yahoo Finance 顯示 $143.80B，Apple\
      \ 官方 PDF 顯示 $143.756B，\n     差異 0.03%（<3%），本報告以官方 PDF 為準。」\n\n6. 計算百分比時，分子分母原始數字必須顯示\n\
      \   → 正確：YoY = ($143,756M - $124,300M) / $124,300M = +15.65%\n   → 錯誤：YoY =\
      \ +15.7%（未顯示計算過程）\n\n7. 新增兩階段流程：先驗證 → 再寫報告\n8. 若標記「未明確」，必須先說明為何無法從去年同期 10-Q\
      \ 取得，否則預設為應查閱。\n\n【季度數據一致性核實規則（新增）】\n財務表格中每一個絕對數值，必須同時標注：\n(i)  原始公告文件名稱（如「2025Q3業績公告，p.X」）\n\
      (ii) 該數值在公告中的原始英文欄位名稱\n     （如「Gross Profit」「Operating Profit」）\n若同一份報告涉及多個季度的數據，\n\
      必須在每個數值旁明確標注對應季度。\n禁止在不同季度數據之間進行隱性混用。\n\ndon't need to write 來源\n\n### 最終自查清單（提交前必須完成）\n\
      \n[ ] 所有 YoY 對比數字已從去年同期原始 10-Q 取得（非本季 10-Q 的對比欄）\n[ ] 所有比率已顯示倒推計算步驟\n[ ] 所有非單季數字已標注時間範圍標籤（[Q單季]/[TTM]/[累計]）\n\
      [ ] 所有法律賠償項目已核查 10-Q 法律章節，確認計提狀態\n[ ] 流動比率計算結果已與行業常識交叉核查（Apple通常 <1）\n[ ] ROE\
      \ 已同時列出年化TTM版本及單季版本\n[ ] 未使用任何訓練記憶中的歷史財務數字\n"
  exec:
    name: 管理層評估
    prompt: '資料來源指引：{data_source}, linkedin

      目前實際時間為: {today}, 請務必使用2026年3月之後發布的最新公告 (最新董事會決議公告)。



      ## 分析標的：{stock_name}（{ticker}，{exchange}）

      請在網上查看最新資料，包括公司官網、新聞報導等，了解 CEO、CFO 及核心高管的背景與經歷。


      請依照以下框架逐項分析：


      ### 一、核心管理層背景

      請以 Markdown 表格列出 CEO、CFO 及核心高管（如 COO 或 CTO）：

      | 職位 | 姓名 | 任期 | 核心背景 (教育/過往名企經驗) | 行業深耕年資 | 歷史戰績/關鍵功績 |

      | :--- | :--- | :--- | :--- | :--- | :--- |


      - **經驗評估**：團隊整體經驗是否具備互補性？是否有過往轉虧為盈或成功擴張的案例？

      - **變動預警**：近 12 個月是否有核心高管離職？其原因是否暗示公司內部治理問題？


      ### 二、 內部交易與利益綑綁 (Insider Trading & Compensation)

      - **交易分析**：整理近 6 個月內部人士買賣表格。是否有異常大額減持（尤其是非計畫性賣出）？

      - **薪酬結構**：CEO 薪酬中股票/期權佔比多少？是否存在過度激勵短期股價而損害長期利益的條款？

      - **持股水平**：管理層持股比例是否足以讓其與普通股東「同舟共濟」？


      ### 三、 財務執行力與策略一致性

      - **績效對比**：分析該團隊執政期間，ROE（股東權益報酬率）與營收成長是否優於行業平均？

      - **承諾兌現**：管理層過去在電話會議（Earnings Call）中提出的策略目標，落實進度如何？

      - **面對壞消息的態度：當業績下滑時，管理層是歸咎於大環境（總體經濟、匯率、天氣），還是勇於承認策略失誤並提出具體修正方案？


      ### 四、誠信與治理記錄

      - **爭議與誠信**：搜尋並列出高管過去是否有過法律訴訟、財務造假疑雲、或在其他公司任職時的負面紀錄。

      - **董事會獨立性**：董事會是否淪為管理層的「橡皮圖章」？獨立董事比例是否足夠？


      ### 五、 綜合評估與評分

      請根據上述分析，給予 1-10 分的評分：

      | 評估維度 | 評分 (1-10) | 關鍵理由 (一句話總結) |

      | :--- | :--- | :--- |

      | 專業能力與經驗 | | |

      | 誠信與管治記錄 | | |

      | 股東利益一致性 | | |

      | 執行力與戰略眼光 | | |

      | **加權綜合評分** | | |

      '
