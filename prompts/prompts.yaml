      (iv) 若某機構的目標價或評級無法從公開來源核實，\n     必須標注「⚠️ 數據待核實」，不得填入估算值\n(v)  嚴禁為求「平衡」而虛構少數Sell評級\n\
      \n請以資深賣方研究分析師的角度，綜合最新市場數據，撰寫一份完整的研究報告：\n請在網上查看最新資料，所有數據均以 yahoo Finance {today}\
      \ ) 為主, \n\n---\n\n### 一、分析師評級與目標價總覽\n- 目前華爾街分析師共識評級為何？（Strong Buy / Buy / Hold\
      \ / Sell / Strong Sell）\n- 分析師人數分佈：各評級分別有幾位分析師？\n- 共識目標價（Consensus Price Target）是多少？\n\
      - 目標價區間：最高目標價 vs 最低目標價\n- 相較當前股價，潛在上行空間（Upside）或下行風險（Downside）為何？(最新收盤價：[價格]\
      \ | 日期：[YYYY-MM-DD] (*use the date of price in yahoo Finance price)\n- 過去 30\
      \ / 90 天內，是否有評級調升（Upgrade）或調降（Downgrade）？\n\n---\n\n### 二、重點機構最新研究動態\n- 列出最近\
      \ 3–5 家發布研究報告的主要投行或券商\n- 各機構的評級、目標價及核心觀點摘要, 請確保數字係最新而絕對正確\n- 是否有與市場共識明顯背離的「離群」觀點？其理由為何？\n\
      \n---\n\n### 三、盈利預估（EPS Estimates）\n- 當季 / 下季 / 全年 EPS 共識預估值\n- 過去 30 天內，EPS\
      \ 預估是否有明顯上修（Revision Up）或下修（Revision Down）？\n- EPS Surprise 歷史記錄：近 4 季實際 EPS\
      \ 與預估的偏差（Beat/Miss）\n\n---\n\n### 四、營收預估（Revenue Estimates）\n- 當季 / 全年營收共識預估\n\
      - YoY 成長率預期\n- 分析師對毛利率或營業利益率的預期趨勢\n\n---\n\n### 五、估值分析（Valuation）\n- 目前本益比（P/E）、前瞻本益比（Forward\
      \ P/E）\n- EV/EBITDA、P/S 等相對估值指標\n- 與同業（Peers）及歷史估值區間相比，目前偏貴、合理或偏便宜？\n\n---\n\
      \n### 六、關鍵催化劑與風險因子\n**潛在上行催化劑：**\n- 列出 2–3 項可能推動股價上漲的事件或因素\n\n**主要下行風險：**\n\
